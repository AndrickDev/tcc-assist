name: CI AI

on:
  pull_request:
    paths:
      - 'services/ai/**'
      - '.github/workflows/ci-ai.yml'
  push:
    branches: [main]
    paths:
      - 'services/ai/**'
      - '.github/workflows/ci-ai.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run mypy .
      - run: uv run pytest -q
