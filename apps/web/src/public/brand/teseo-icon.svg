<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Teseo">
  <!--
    Celtic 4-fold love knot — quatro laços em formato de coração
    entrelaçados simetricamente, cor terracota #c4663a
    Aproximação fiel ao logo fornecido pelo usuário
  -->
  <g fill="none" stroke="#c4663a" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">

    <!-- Laço Superior (coração apontando para baixo) -->
    <path d="
      M100 52
      C 100 52, 80 32, 60 40
      C 40 48, 38 70, 55 82
      C 70 92, 100 100, 100 100
      C 100 100, 130 92, 145 82
      C 162 70, 160 48, 140 40
      C 120 32, 100 52, 100 52 Z
    "/>

    <!-- Laço Inferior (coração apontando para cima) -->
    <path d="
      M100 148
      C 100 148, 80 168, 60 160
      C 40 152, 38 130, 55 118
      C 70 108, 100 100, 100 100
      C 100 100, 130 108, 145 118
      C 162 130, 160 152, 140 160
      C 120 168, 100 148, 100 148 Z
    "/>

    <!-- Laço Esquerdo (coração apontando para a direita) -->
    <path d="
      M52 100
      C 52 100, 32 80, 40 60
      C 48 40, 70 38, 82 55
      C 92 70, 100 100, 100 100
      C 100 100, 92 130, 82 145
      C 70 162, 48 160, 40 140
      C 32 120, 52 100, 52 100 Z
    "/>

    <!-- Laço Direito (coração apontando para a esquerda) -->
    <path d="
      M148 100
      C 148 100, 168 80, 160 60
      C 152 40, 130 38, 118 55
      C 108 70, 100 100, 100 100
      C 100 100, 108 130, 118 145
      C 130 162, 152 160, 160 140
      C 168 120, 148 100, 148 100 Z
    "/>

  </g>

  <!-- Quadrados característicos nos 4 pontos cardeais (como na imagem) -->
  <rect x="93" y="16" width="14" height="14" rx="2" fill="#c4663a"/>
  <rect x="93" y="170" width="14" height="14" rx="2" fill="#c4663a"/>
  <rect x="16" y="93" width="14" height="14" rx="2" fill="#c4663a"/>
  <rect x="170" y="93" width="14" height="14" rx="2" fill="#c4663a"/>
</svg>
